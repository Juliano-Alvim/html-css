<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
        div {
            background-color: lightgray;
            text-align: center;
            height: 200px;
            width: 200px;
            border: 1px solid black;
            display: inline-block;
            
            
        }

        div:hover {
            background-color: red;
        }

        div > p {
            color: blue;
        }

        .caixa {
            margin-bottom: 50px;
        }

        .outra {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div>
        01
        <p>Parágrafo dentro</p>
    </div>
    <div class="caixa">
        02
        <p>Segundo parágrafo dentro</p>
    </div>
    
    <div class="outra">
        03
        <p>Terceiro parágrafo dentro</p>
    </div>
    <p>Terceiro parágrafo fora</p>
</body>
</html>
