<!DOCTYPE html>
<html>
<head>
    <style>
        h1 {
            background-color: yellow;
            border: 2px solid red;
            width: 300px;   /* Vamos ver se inline respeita isso */
        }
        
        .h1-maluquinho {
            display: inline;  /* Transformando o H1 em inline */
            background-color: lightblue;
            border: 2px solid blue;
            width: 300px;     /* Inline VAI IGNORAR isso! */
        }
    </style>
</head>
<body>
    <h1>Título H1 normal (box-level)</h1>
    <h1>Outro H1 normal</h1>
    
    <hr>
    
    <h1 class="h1-maluquinho">H1 virou inline!</h1>
    <h1 class="h1-maluquinho">Outro H1 inline do lado</h1>
    <span>Olha, tô do lado dos H1s agora!</span>
</body>
</html>
