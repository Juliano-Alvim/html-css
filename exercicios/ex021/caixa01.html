<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
            background-color: lightblue;
            width: 300px;
            text-align: center;
            border: 10px solid violet;
            padding: 10px 20px 30px 40px;
            margin: 30px auto 50px auto;
            outline: 5px dotted green;
        }

        a {
            border-style: dotted;
            border-width: 3px;
            border-color: blueviolet;
        }

        span {
            border-style: solid;
            border-width: 5px;
            border-color: blueviolet;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p><a href="#">Clique aqui</a> para entrar no link</p>
    <p>O mesmo serve para a tag span, <span>posso usar uma inline</span> dentro de uma box</p>
</body>
</html>
